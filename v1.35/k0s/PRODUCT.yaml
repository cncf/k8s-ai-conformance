metadata:
  kubernetesVersion: v1.35
  platformName: k0s
  platformVersion: v1.35.3+k0s.0
  vendorName: Mirantis
  websiteUrl: https://k0sproject.io
  repoUrl: https://github.com/k0sproject/k0s
  documentationUrl: https://docs.k0sproject.io
  productLogoUrl: https://raw.githubusercontent.com/k0sproject/k0s/refs/tags/v1.35.3+k0s.0/docs/img/k0s-logo-2025-horizontal.svg
  description: "k0s is a zero-friction, single-binary Kubernetes distribution."
  contactEmailAddress: conformance@mirantis.com
  k8sConformanceUrl: https://github.com/cncf/k8s-conformance/tree/master/v1.35/k0s

spec:
  accelerators:
    - id: dra_support
      description: "Support Dynamic Resource Allocation (DRA) APIs to enable more flexible and fine-grained resource requests beyond simple counts."
      level: MUST
      status: Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#dra-support
      notes: "k0s v1.35.3+k0s.0 ships Kubernetes v1.35.3, which locks the Dynamic Resource Allocation feature gate enabled-by-default. The resource.k8s.io/v1 API (DeviceClass, ResourceClaim, ResourceClaimTemplate, ResourceSlice) is available out-of-the-box. A functional end-to-end demonstration using dra-example-driver is published at the evidence URL."

    - id: driver_runtime_management
      description: "Provide a verifiable mechanism for ensuring that compatible accelerator drivers and corresponding container runtime configurations are correctly installed and maintained on nodes with accelerators. Once the accelerator supports exposing driver and runtime version information as part of DRA, then the platform should use the DRA mechanism for verification."
      level: SHOULD
      status: Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#driver-runtime-management
      notes: "NVIDIA GPU Operator (Helm chart nvidia/gpu-operator) installs and manages the NVIDIA driver and container runtime on k0s worker nodes. Tested with GPU Operator v26.3.1 against NVIDIA T4 on Azure."

    - id: gpu_sharing
      description: "For accelerators that support static GPU sharing, provide well-defined mechanisms for at least one GPU sharing strategy to improve utilization for workloads that do not require a full dedicated GPU. If hardware-level partitioning is supported, then these fractional GPU resources should be exposed as schedulable resources. If software-based sharing (e.g. time-slicing) is supported, then oversubscription of GPUs should be allowed. Forward-looking: Once the accelerator supports static GPU sharing as part of DRA, the platform should expose the DRA mechanism to allow users to leverage static GPU sharing. Once the accelerator supports dynamic GPU sharing as part of DRA and the partitionable devices feature is GA, the platform should expose the DRA mechanism to allow users to leverage dynamic GPU sharing."
      level: SHOULD
      status: Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#gpu-sharing
      notes: "NVIDIA Device Plugin time-slicing supported via the GPU Operator ClusterPolicy. A physical GPU is advertised as N schedulable replicas via a ConfigMap. Demonstrated on NVIDIA T4 (MIG is not supported on T4 hardware; time-slicing is the applicable sharing mechanism)."

    - id: virtualized_accelerator
      description: "For accelerators that support virtualized accelerator technologies (e.g. vGPU), provide well-defined mechanisms for these to be exposed and managed, maintaining consistency with physical fractional GPUs. Forward-looking: Once the accelerator supports virtualized accelerator technologies as part of DRA, then the platform should use the DRA mechanism."
      level: SHOULD
      status: Not Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#virtualized-accelerator
      notes: "k0s does not ship a packaged vGPU integration. vGPU support depends on NVIDIA vGPU licensing and A100-class or newer hardware, both outside the scope of the k0s distribution. Users deploying k0s on vGPU-capable hardware can install the vGPU driver and standard NVIDIA Device Plugin via the GPU Operator; this path is supported upstream but not demonstrated in this submission."

  networking:
    - id: ai_inference
      description: "Support the Kubernetes Gateway API with an implementation for advanced traffic management for inference services, which enables capabilities like weighted traffic splitting, header-based routing (for OpenAI protocol headers), and optional integration with service meshes."
      level: MUST
      status: Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#ai-inference
      notes: "k0s supports the Kubernetes Gateway API (gateway.networking.k8s.io/v1). Tested with the standard-channel CRDs and Envoy Gateway as the Gateway implementation. HTTPRoute traffic-matching and path-based routing demonstrated against a mock inference backend."

  schedulingOrchestration:
    - id: gang_scheduling
      description: "The platform must allow for the installation and successful operation of at least one gang scheduling solution that ensures all-or-nothing scheduling for distributed AI workloads (e.g. Kueue, Volcano, etc.) To be conformant, the vendor must demonstrate that their platform can successfully run at least one such solution."
      level: MUST
      status: Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#gang-scheduling
      notes: "Volcano (CNCF incubating project) installs cleanly on k0s via its Helm chart. All-or-nothing scheduling demonstrated with a batch.volcano.sh Job; under-capacity gang refuses partial placement."

    - id: cluster_autoscaling
      description: "If the platform provides a cluster autoscaler or an equivalent mechanism, it must be able to scale up/down node groups containing specific accelerator types based on pending pods requesting those accelerators."
      level: MUST
      status: Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#cluster-autoscaling
      notes: "k0s is a Kubernetes distribution and does not bundle a cluster-autoscaler implementation. The upstream Kubernetes cluster-autoscaler (kubernetes/autoscaler) deploys onto k0s without modification and integrates with every supported cloud provider (Azure, AWS, GCP, Cluster API). Accelerator-specific scaling is driven by nvidia.com/gpu pod requests and node labels; the NVIDIA Device Plugin from the GPU Operator advertises these resources."

    - id: pod_autoscaling
      description: "If the platform supports the HorizontalPodAutoscaler, it must function correctly for pods utilizing accelerators. This includes the ability to scale these Pods based on custom metrics relevant to AI/ML workloads."
      level: MUST
      status: Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#pod-autoscaling
      notes: "Standard HorizontalPodAutoscaler API (autoscaling/v2) works with GPU-consuming Deployments. metrics-server is bundled with k0s. Demonstrated HPA scaling a Deployment that requests nvidia.com/gpu based on CPU utilization."

  observability:
    - id: accelerator_metrics
      description: "For supported accelerator types, the platform must allow for the installation and successful operation of at least one accelerator metrics solution that exposes fine-grained performance metrics via a standardized, machine-readable metrics endpoint. This must include a core set of metrics for per-accelerator utilization and memory usage. Additionally, other relevant metrics such as temperature, power draw, and interconnect bandwidth should be exposed if the underlying hardware or virtualization layer makes them available. The list of metrics should align with emerging standards, such as OpenTelemetry metrics, to ensure interoperability. The platform may provide a managed solution, but this is not required for conformance."
      level: MUST
      status: Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#accelerator-metrics
      notes: "NVIDIA DCGM Exporter (installed as part of the GPU Operator) exposes fine-grained per-GPU metrics (utilization, memory, temperature, power) on /metrics in Prometheus format. Integration with kube-prometheus-stack demonstrated via ServiceMonitor; labels include GPU UUID, PCI bus, driver version, model name, and host."

    - id: ai_service_metrics
      description: "Provide a monitoring system capable of discovering and collecting metrics from workloads that expose them in a standard format (e.g. Prometheus exposition format). This ensures easy integration for collecting key metrics from common AI frameworks and servers."
      level: MUST
      status: Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#ai-service-metrics
      notes: "kube-prometheus-stack (prometheus-community Helm chart) discovers and scrapes workload metrics via the standard ServiceMonitor and PodMonitor resources. Demonstrated with a sample inference-shape workload exposing /metrics in Prometheus format."

  security:
    - id: secure_accelerator_access
      description: "Ensure that access to accelerators from within containers is properly isolated and mediated by the Kubernetes resource management framework (device plugin or DRA) and container runtime, preventing unauthorized access or interference between workloads."
      level: MUST
      status: Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#secure-accelerator-access
      notes: "Accelerator access is mediated by the NVIDIA Device Plugin via the Kubernetes device-plugin API. Two isolation invariants demonstrated: (1) pods not requesting nvidia.com/gpu and not running under the nvidia RuntimeClass have no access to GPU devices (nvidia-smi not found); (2) scheduler enforces per-GPU capacity — a second GPU-requesting pod stays Pending on a single-GPU node."

  operator:
    - id: robust_controller
      description: "The platform must prove that at least one complex AI operator with a CRD (e.g., Ray, Kubeflow) can be installed and functions reliably. This includes verifying that the operator's pods run correctly, its webhooks are operational, and its custom resources can be reconciled."
      level: MUST
      status: Implemented
      evidence:
        - https://docs.k0sproject.io/head/governance/cncf/ai-conformance/#robust-controller
      notes: "KubeRay operator installs cleanly on k0s via Helm. RayCluster CR reconciliation demonstrated (head plus worker pods), Ray workload executes end-to-end, and the operator recreates a deleted head pod automatically. Proves k0s hosts complex AI operators with CRDs and reliable reconciliation."
